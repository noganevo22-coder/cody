<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתרגם מבנה - הגדרות אישיות</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --warning: #f39c12;
            --secondary: #95a5a6;
            --bg: #f0f2f5;
            --text-main: #2c3e50;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --drag-bg: rgba(74, 144, 226, 0.2);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s;
        }

        body.drag-active { background-color: var(--drag-bg); }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        .mode-indicator {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background: #eef2f7;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            border: 2px solid transparent;
        }
        .mode-indicator:hover {
            background: #e1e8ed;
            border-color: var(--primary);
        }

        .settings-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            right: 4px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(-20px); }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            resize: vertical;
            font-family: monospace;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            color: white;
            transition: transform 0.1s;
        }

        .btn-copy { background-color: var(--success); }
        .btn-download { background-color: var(--warning); }
        button:active { transform: scale(0.98); }

        #toast {
            visibility: hidden;
            min-width: 220px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            z-index: 100;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h1>מתרגם מבנה</h1>

    <div id="modeDisplay" class="mode-indicator" onclick="toggleMode()" title="לחץ להחלפת כיוון">
        טוען מצב...
    </div>

    <div class="settings-bar">
        <div class="setting-item">
            <span>העתקה אוטומטית:</span>
            <label class="switch">
                <input type="checkbox" id="autoCopyToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <span>הורדה אוטומטית:</span>
            <label class="switch">
                <input type="checkbox" id="autoDownloadToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <label>קלט (גרור כל קובץ לכאן):</label>
    <textarea id="inputText" oninput="processText(false)" placeholder="הדבק טקסט או גרור קובץ מכל סוג..."></textarea>

    <div class="actions">
        <button class="btn-copy" onclick="copyToClipboard(true)">📋 העתק ידני</button>
        <button class="btn-download" onclick="downloadTxt()">💾 הורד קובץ</button>
    </div>

    <label>תוצאה:</label>
    <textarea id="outputText" readonly placeholder="התוצאה תופיע כאן..."></textarea>
</div>

<div id="toast">✅ הועתק!</div>

<script>
    /* ==========================================
       מרכז שליטה - שנה את הערכים כאן למטה
       ========================================== */
    const CONFIG = {
        defaultToReverse: false,   // true = פענוח (קוד ← טקסט), false = קידוד (טקסט ← קוד)
        autoCopyEnabled: false,    // האם העתקה אוטומטית תהיה פעילה כברירת מחדל
        autoDownloadEnabled: true  // האם הורדה אוטומטית (בהדבקה) תהיה פעילה כברירת מחדל
    };

    let isReverseMode = CONFIG.defaultToReverse;
    let toastTimeout;

    const enMap = {
        'a':'אא', 'b':'אב', 'c':'אג', 'd':'אד', 'e':'אה', 'f':'או', 'g':'אז', 'h':'אח', 'i':'אט', 'j':'אי',
        'k':'אכ', 'l':'אל', 'm':'אמ', 'n':'אנ', 'o':'אס', 'p':'אע', 'q':'אפ', 'r':'אצ', 's':'אק', 't':'אר',
        'u':'אש', 'v':'את', 'w':'אך', 'x':'אם', 'y':'אן', 'z':'אף',
        'A':'אץ', 'B':'בא', 'C':'בב', 'D':'בג', 'E':'בד', 'F':'בה', 'G':'בו', 'H':'בז', 'I':'בח', 'J':'בט',
        'K':'בי', 'L':'בכ', 'M':'בל', 'N':'במ', 'O':'בנ', 'P':'בס', 'Q':'בע', 'R':'בפ', 'S':'בצ', 'T':'בק',
        'U':'בר', 'V':'בש', 'W':'בת', 'X':'בך', 'Y':'בם', 'Z':'בן',
        '0':'בף', '1':'בץ', '2':'גא', '3':'גב', '4':'גג', '5':'גד', '6':'גה', '7':'גו', '8':'גז', '9':'גח',
        ' ':'גט', '(':'גי', ')':'גכ', '*':'גל', '&':'גמ', '^':'גנ', '%':'גס', '$':'גע', '#':'גפ', '@':'גצ',
        '!':'גק', '>':'גר', '<':'גש', '.':'גת', '"':'גך', "'":'גם', '[':'גן', ']':'גף', '{':'גץ', '}':'דא',
        ',':'דב', ';':'דג', ':':'דד', '/':'דה', '\\':'דו', '|':'דז', '?':'דח', '+':'דט', '=':'די', '-':'דכ',
        '_':'דל', '~':'דמ', '`':'דנ',
        'א':'דס', 'ב':'דע', 'ג':'דפ', 'ד':'דצ', 'ה':'דק', 'ו':'דר', 'ז':'דש', 'ח':'דת', 'ט':'דך', 'י':'דם',
        'כ':'דן', 'ל':'דף', 'מ':'דץ', 'נ':'הא', 'ס':'הב', 'ע':'הג', 'פ':'הד', 'צ':'הה', 'ק':'הו', 'ר':'הז',
        'ש':'הח', 'ת':'הט', 'ך':'הי', 'ם':'הכ', 'ן':'הל', 'ף':'המ', 'ץ':'הנ'
    };

    const reverseMap = {};
    for (let key in enMap) { reverseMap[enMap[key]] = key; }

    const body = document.body;
    const inputArea = document.getElementById('inputText');
    const outputArea = document.getElementById('outputText');
    const autoCopyToggle = document.getElementById('autoCopyToggle');
    const autoDownloadToggle = document.getElementById('autoDownloadToggle');
    const modeDisplay = document.getElementById('modeDisplay');

    // אתחול הגדרות לפי ה-CONFIG
    function init() {
        autoCopyToggle.checked = CONFIG.autoCopyEnabled;
        autoDownloadToggle.checked = CONFIG.autoDownloadEnabled;
        updateModeUI();
    }

    // ניהול ויזואלי של גרירה
    window.addEventListener('dragenter', (e) => { e.preventDefault(); body.classList.add('drag-active'); });
    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) body.classList.remove('drag-active'); });

    window.addEventListener('drop', (e) => {
        e.preventDefault();
        body.classList.remove('drag-active');
        const file = e.dataTransfer.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                inputArea.value = event.target.result;
                processText(true);
            };
            reader.readAsText(file);
        }
    });

    inputArea.addEventListener('paste', () => {
        setTimeout(() => processText(true), 10);
    });

    function toggleMode() {
        isReverseMode = !isReverseMode;
        updateModeUI();
        processText(false);
    }

    function updateModeUI() {
        modeDisplay.innerText = isReverseMode ? 
            "מצב נוכחי: פענוח (קוד ← טקסט) 🔄" : 
            "מצב נוכחי: קידוד (טקסט ← קוד) 🔄";
        modeDisplay.style.color = isReverseMode ? "#e67e22" : "var(--primary)";
    }

    function processText(triggerDownload = false) {
        const input = inputArea.value;
        if (!input) { outputArea.value = ""; return; }

        let finalOutput = "";
        if (!isReverseMode) {
            for (let char of input) {
                finalOutput += (char === '\n' || char === '\r') ? char : (enMap[char] || "");
            }
        } else {
            let i = 0;
            while (i < input.length) {
                if (input[i] === '\n' || input[i] === '\r') {
                    finalOutput += input[i]; i++;
                } else {
                    let pair = input.substr(i, 2);
                    if (reverseMap[pair]) { finalOutput += reverseMap[pair]; i += 2; }
                    else { i++; }
                }
            }
        }
        outputArea.value = finalOutput;

        if (finalOutput && autoCopyToggle.checked) {
            navigator.clipboard.writeText(finalOutput).then(() => showToast("📋 הועתק אוטומטית"));
        }

        if (finalOutput && triggerDownload && autoDownloadToggle.checked) {
            downloadTxt(true);
        }
    }

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.className = "show";
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { toast.className = ""; }, 2000);
    }

    function copyToClipboard(manual = false) {
        if(!outputArea.value) return;
        navigator.clipboard.writeText(outputArea.value).then(() => {
            if(manual) showToast("✅ הועתק ללוח!");
        });
    }

    function downloadTxt(isAuto = false) {
        if(!outputArea.value) return;
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(outputArea.value));
        element.setAttribute('download', isAuto ? "translated_file.txt" : "result.txt");
        element.click();
        if(isAuto) showToast("💾 הורדה אוטומטית בוצעה");
    }

    // הפעלה ראשונית
    init();
</script>

</body>
</html>
