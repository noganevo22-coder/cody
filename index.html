<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОъОфОеОњОЮ ОъОЉОаОћ ОъОЋОЊОеОаОЎ</title>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --success: #2ecc71;
            --success-hover: #27ae60;
            --warning: #f39c12;
            --warning-hover: #d68910;
            --bg: #f0f2f5;
            --text-main: #2c3e50;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-en { background-color: var(--primary); }
        .btn-en:hover { background-color: var(--primary-hover); box-shadow: 0 6px 12px rgba(74, 144, 226, 0.2); }

        .btn-copy { background-color: var(--success); }
        .btn-copy:hover { background-color: var(--success-hover); box-shadow: 0 6px 12px rgba(46, 204, 113, 0.2); }

        .btn-download { background-color: var(--warning); }
        .btn-download:hover { background-color: var(--warning-hover); box-shadow: 0 6px 12px rgba(243, 156, 18, 0.2); }

        #outputText {
            background-color: #fafbfc;
            border-style: dashed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ОфОеОњОЋОЮ ОЕОЋОъОе ОъОЉОаОћ</h1>
    
    <label for="inputText">ОўОДОАОў ОъОДОЋОе</label>
    <textarea id="inputText" placeholder="ОћОЊОЉОД ОљОЋ ОћОДОюОЊ ОўОДОАОў ОЏОљОЪ..."></textarea>

    <div class="actions">
        <button class="btn-en" onclick="processEn()">РџА ОфОеОњОЮ ОбОЏОЕОЎОЋ</button>
        <button class="btn-copy" onclick="copyToClipboard()">­ЪЊІ ОћОбОфОД ОцОюОў</button>
        <button class="btn-download" onclick="downloadTxt()">­ЪњЙ ОћОЋОеОЊ ОДОЋОЉОЦ</button>
    </div>

    <label for="outputText">ОфОЋОдОљОф ОћОфОеОњОЋОЮ</label>
    <textarea id="outputText" readonly placeholder="ОћОфОЋОдОљОћ ОфОЋОцОЎОб ОЏОљОЪ..."></textarea>
</div>

<script>
    const hebrewToLatinMap = {
        'Ољ':'A','ОЉ':'B','Оњ':'C','ОЊ':'D','Оћ':'E','ОЋ':'F','Оќ':'G','ОЌ':'H','Оў':'I','ОЎ':'J','ОЏ':'K','Оџ':'L',
        'Ою':'M','Оъ':'N','ОЮ':'O','Оа':'P','ОЪ':'Q','ОА':'R','Об':'S','Оц':'T','ОБ':'U','Од':'V','ОЦ':'W','ОД':'X',
        'Ое':'Y','ОЕ':'Z','Оф':'_'
    };

    const en = {
        'a':'ОљОљ', 'b':'ОљОЉ', 'c':'ОљОњ', 'd':'ОљОЊ', 'e':'ОљОћ', 'f':'ОљОЋ', 'g':'ОљОќ', 'h':'ОљОў', 'i':'ОљОЎ', 'j':'ОљОЎ',
        'k':'ОљОЏ', 'l':'ОљОю', 'm':'ОљОъ', 'n':'ОљОа', 'o':'ОљОА', 'p':'ОљОб', 'q':'ОљОц', 'r':'ОљОд', 's':'ОљОД', 't':'ОљОе',
        'u':'ОљОЕ', 'v':'ОљОф', 'w':'ОљОџ', 'x':'ОљОЮ', 'y':'ОљОЪ', 'z':'ОљОБ',
        'A':'ОљОЦ', 'B':'ОЉОљ', 'C':'ОЉОЉ', 'D':'ОЉОњ', 'E':'ОЉОЊ', 'F':'ОЉОћ', 'G':'ОЉОЋ', 'H':'ОЉОќ', 'I':'ОЉОЌ', 'J':'ОЉОў',
        'K':'ОЉОЎ', 'L':'ОЉОЏ', 'M':'ОЉОю', 'N':'ОЉОъ', 'O':'ОЉОа', 'P':'ОЉОА', 'Q':'ОЉОб', 'R':'ОЉОц', 'S':'ОЉОд', 'T':'ОЉОД',
        'U':'ОЉОе', 'V':'ОЉОЕ', 'W':'ОЉОф', 'X':'ОЉОџ', 'Y':'ОЉОЮ', 'Z':'ОЉОЪ',
        '0':'ОЉОБ', '1':'ОЉОЦ', '2':'ОњОљ', '3':'ОњОЉ', '4':'ОњОњ', '5':'ОњОЊ', '6':'ОњОћ', '7':'ОњОЋ', '8':'ОњОќ', '9':'ОњОЌ',
        ' ':'ОњОў', '(':'ОњОЎ', ')':'ОњОЏ', '*':'ОњОю', '&':'ОњОъ', '^':'ОњОа', '%':'ОњОА', '$':'ОњОб', '#':'ОњОц', '@':'ОњОд',
        '!':'ОњОД', '>':'ОњОе', '<':'ОњОЕ', '.':'ОњОф', '"':'ОњОџ', "'":'ОњОЮ', '[':'ОњОЪ', ']':'ОњОБ', '{':'ОњОЦ', '}':'ОЊОљ',
        ',':'ОЊОЉ', ';':'ОЊОњ', ':':'ОЊОЊ', '/':'ОЊОћ', '\\':'ОЊОЋ', '|':'ОЊОќ', '?':'ОЊОЌ', '+':'ОЊОў', '=':'ОЊОЎ', '-':'ОЊОЏ',
        '_':'ОЊОю', '~':'ОЊОъ', '`':'ОЊОа'
    };

    function processEn() {
        const input = document.getElementById('inputText').value;
        let finalOutput = "";

        for (let char of input) {
            if (char === '\n' || char === '\r') {
                finalOutput += char;
            } else {
                let latinChar = hebrewToLatinMap[char] || char;
                finalOutput += en[latinChar] || "";
            }
        }
        document.getElementById('outputText').value = finalOutput;
        
        // ОљОцОДОў ОДОўОЪ ОюОћОдОюОЌОћ
        const out = document.getElementById('outputText');
        out.style.borderColor = 'var(--success)';
        setTimeout(() => out.style.borderColor = '#e1e8ed', 1000);
    }

    function copyToClipboard() {
        const output = document.getElementById('outputText');
        output.select();
        document.execCommand('copy');
        alert('ОћОўОДОАОў ОћОЋОбОфОД ОюОюОЋОЌ!');
    }

    function downloadTxt() {
        const text = document.getElementById('outputText').value;
        if(!text) return alert('ОљОЎОЪ ОўОДОАОў ОюОћОЋОеОЊОћ');
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', "translation.txt");
        element.click();
    }
</script>
</body>
</html>
