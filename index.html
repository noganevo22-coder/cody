<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתרגם מבנה מודרני - לייב</title>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --success: #2ecc71;
            --success-hover: #27ae60;
            --warning: #f39c12;
            --warning-hover: #d68910;
            --bg: #f0f2f5;
            --text-main: #2c3e50;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-en { background-color: var(--primary); }
        .btn-copy { background-color: var(--success); }
        .btn-download { background-color: var(--warning); }

        #outputText {
            background-color: #fafbfc;
            border-style: dashed;
        }

        .live-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #ff4757;
            color: white;
            border-radius: 4px;
            font-size: 0.7rem;
            vertical-align: middle;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>תרגום שומר מבנה <span class="live-badge">LIVE</span></h1>
    
    <label for="inputText">טקסט מקור (הקלד כאן לתרגום מיידי)</label>
    <textarea id="inputText" oninput="processEn()" placeholder="הדבק או הקלד טקסט כאן..."></textarea>

    <div class="actions">
        <button class="btn-copy" onclick="copyToClipboard()">📋 העתק פלט</button>
        <button class="btn-download" onclick="downloadTxt()">💾 הורד קובץ</button>
    </div>

    <label for="outputText">תוצאת התרגום</label>
    <textarea id="outputText" readonly placeholder="התוצאה תופיע כאן..."></textarea>
</div>

<script>
    const hebrewToLatinMap = {
        'א':'A','ב':'B','ג':'C','ד':'D','ה':'E','ו':'F','ז':'G','ח':'H','ט':'I','י':'J','כ':'K','ך':'L',
        'ל':'M','מ':'N','ם':'O','נ':'P','ן':'Q','ס':'R','ע':'S','פ':'T','ף':'U','צ':'V','ץ':'W','ק':'X',
        'ר':'Y','ש':'Z','ת':'_'
    };

    const en = {
        'a':'אא', 'b':'אב', 'c':'אג', 'd':'אד', 'e':'אה', 'f':'או', 'g':'אז', 'h':'אח', 'i':'אט', 'j':'אי',
        'k':'אכ', 'l':'אל', 'm':'אמ', 'n':'אנ', 'o':'אס', 'p':'אע', 'q':'אפ', 'r':'אצ', 's':'אק', 't':'אר',
        'u':'אש', 'v':'את', 'w':'אך', 'x':'אם', 'y':'אן', 'z':'אף',
        'A':'אץ', 'B':'בא', 'C':'בב', 'D':'בג', 'E':'בד', 'F':'בה', 'G':'בו', 'H':'בז', 'I':'בח', 'J':'בט',
        'K':'בי', 'L':'בכ', 'M':'בל', 'N':'במ', 'O':'בנ', 'P':'בס', 'Q':'בע', 'R':'בפ', 'S':'בצ', 'T':'בק',
        'U':'בר', 'V':'בש', 'W':'בת', 'X':'בך', 'Y':'בם', 'Z':'בן',
        '0':'בף', '1':'בץ', '2':'גא', '3':'גב', '4':'גג', '5':'גד', '6':'גה', '7':'גו', '8':'גז', '9':'גח',
        ' ':'גט', '(':'גי', ')':'גכ', '*':'גל', '&':'גמ', '^':'גנ', '%':'גס', '$':'גע', '#':'גפ', '@':'גצ',
        '!':'גק', '>':'גר', '<':'גש', '.':'גת', '"':'גך', "'":'גם', '[':'גן', ']':'גף', '{':'גץ', '}':'דא',
        ',':'דב', ';':'דג', ':':'דד', '/':'דה', '\\':'דו', '|':'דז', '?':'דח', '+':'דט', '=':'די', '-':'דכ',
        '_':'דל', '~':'דמ', '`':'דנ'
    };

    function processEn() {
        const input = document.getElementById('inputText').value;
        let finalOutput = "";

        for (let char of input) {
            if (char === '\n' || char === '\r') {
                finalOutput += char;
            } else {
                let latinChar = hebrewToLatinMap[char] || char;
                // תיקון לוגי: אם התו בלטינית קיים במיפוי 'en', נשתמש בו
                finalOutput += en[latinChar] || "";
            }
        }
        document.getElementById('outputText').value = finalOutput;
    }

    function copyToClipboard() {
        const output = document.getElementById('outputText');
        if(!output.value) return;
        output.select();
        document.execCommand('copy');
        
        // משוב ויזואלי קטן על הכפתור
        const btn = document.querySelector('.btn-copy');
        const originalText = btn.innerHTML;
        btn.innerHTML = '✅ הועתק!';
        setTimeout(() => btn.innerHTML = originalText, 2000);
    }

    function downloadTxt() {
        const text = document.getElementById('outputText').value;
        if(!text) return alert('אין טקסט להורדה');
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', "translation.txt");
        element.click();
    }
</script>
</body>
</html>
