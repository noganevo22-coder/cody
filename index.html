<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧһЧӘЧЁЧ’Чқ ЧһЧ‘Ч Ч” - ЧӘЧҷЧ§Ч•Чҹ ЧӨЧўЧ Ч•Ч— ЧһЧңЧҗ</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --warning: #f39c12;
            --secondary: #95a5a6;
            --bg: #f0f2f5;
            --text-main: #2c3e50;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--primary); }

        .mode-indicator {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #eef2f7;
            border-radius: 10px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 25px;
            outline: none;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            color: white;
        }

        .btn-reverse { background-color: var(--secondary); }
        .btn-copy { background-color: var(--success); }
        .btn-download { background-color: var(--warning); }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h1>ЧһЧӘЧЁЧ’Чқ ЧһЧ‘Ч Ч” <span style="font-size: 0.5em;">FIXED</span></h1>
    <div id="modeDisplay" class="mode-indicator" style="color: #e67e22;">ЧһЧҰЧ‘ Ч Ч•ЧӣЧ—Чҷ: Ч”ЧӨЧ•Чҡ (Ч§Ч•Ч“ вҶҗ ЧҳЧ§ЧЎЧҳ)</div>

    <label>ЧҳЧ§ЧЎЧҳ ЧһЧ§Ч•ЧЁ:</label>
    <textarea id="inputText" oninput="processText()" placeholder="Ч”Ч§ЧңЧ“ ЧӣЧҗЧҹ..."></textarea>

    <div class="actions">
        <button class="btn-reverse" onclick="toggleMode()">рҹ”„ Ч”Ч—ЧңЧЈ ЧӣЧҷЧ•Ч•Чҹ</button>
        <button class="btn-copy" onclick="copyToClipboard(true)">рҹ“Ӣ Ч”ЧўЧӘЧ§ ЧҷЧ“Ч Чҷ</button>
        <button class="btn-download" onclick="downloadTxt()">рҹ’ҫ Ч”Ч•ЧЁЧ“ Ч§Ч•Ч‘ЧҘ</button>
    </div>

    <label>ЧӘЧ•ЧҰЧҗЧ”:</label>
    <textarea id="outputText" readonly></textarea>
</div>

<div id="toast">вң… Ч”Ч•ЧўЧӘЧ§ ЧңЧңЧ•Ч—!</div>

<script>
    let isReverseMode = false;
    let toastTimeout;

    // ЧһЧҷЧңЧ•Чҹ ЧһЧҗЧ•Ч—Ч“ ЧңЧңЧҗ Ч”ЧӘЧ Ч’Ч©Ч•ЧҷЧ•ЧӘ
    const en = {
        // ЧҗЧ Ч’ЧңЧҷЧӘ Ч§ЧҳЧ Ч” (ЧҗЧҗ-ЧҗЧЈ)
        'a':'ЧҗЧҗ', 'b':'ЧҗЧ‘', 'c':'ЧҗЧ’', 'd':'ЧҗЧ“', 'e':'ЧҗЧ”', 'f':'ЧҗЧ•', 'g':'ЧҗЧ–', 'h':'ЧҗЧ—', 'i':'ЧҗЧҳ', 'j':'ЧҗЧҷ',
        'k':'ЧҗЧӣ', 'l':'ЧҗЧң', 'm':'ЧҗЧһ', 'n':'ЧҗЧ ', 'o':'ЧҗЧЎ', 'p':'ЧҗЧў', 'q':'ЧҗЧӨ', 'r':'ЧҗЧҰ', 's':'ЧҗЧ§', 't':'ЧҗЧЁ',
        'u':'ЧҗЧ©', 'v':'ЧҗЧӘ', 'w':'ЧҗЧҡ', 'x':'ЧҗЧқ', 'y':'ЧҗЧҹ', 'z':'ЧҗЧЈ',
        // ЧҗЧ Ч’ЧңЧҷЧӘ Ч’Ч“Ч•ЧңЧ” (ЧҗЧҘ-Ч‘Чҹ)
        'A':'ЧҗЧҘ', 'B':'Ч‘Чҗ', 'C':'Ч‘Ч‘', 'D':'Ч‘Ч’', 'E':'Ч‘Ч“', 'F':'Ч‘Ч”', 'G':'Ч‘Ч•', 'H':'Ч‘Ч–', 'I':'Ч‘Ч—', 'J':'Ч‘Чҳ',
        'K':'Ч‘Чҷ', 'L':'Ч‘Чӣ', 'M':'Ч‘Чң', 'N':'Ч‘Чһ', 'O':'Ч‘Ч ', 'P':'Ч‘ЧЎ', 'Q':'Ч‘Чў', 'R':'Ч‘ЧӨ', 'S':'Ч‘ЧҰ', 'T':'Ч‘Ч§',
        'U':'Ч‘ЧЁ', 'V':'Ч‘Ч©', 'W':'Ч‘ЧӘ', 'X':'Ч‘Чҡ', 'Y':'Ч‘Чқ', 'Z':'Ч‘Чҹ',
        // ЧһЧЎЧӨЧЁЧҷЧқ Ч•ЧЎЧҷЧһЧ ЧҷЧқ (Ч‘ЧЈ-Ч“Ч )
        '0':'Ч‘ЧЈ', '1':'Ч‘ЧҘ', '2':'Ч’Чҗ', '3':'Ч’Ч‘', '4':'Ч’Ч’', '5':'Ч’Ч“', '6':'Ч’Ч”', '7':'Ч’Ч•', '8':'Ч’Ч–', '9':'Ч’Ч—',
        ' ':'Ч’Чҳ', '(':'Ч’Чҷ', ')':'Ч’Чӣ', '*':'Ч’Чң', '&':'Ч’Чһ', '^':'Ч’Ч ', '%':'Ч’ЧЎ', '$':'Ч’Чў', '#':'Ч’ЧӨ', '@':'Ч’ЧҰ',
        '!':'Ч’Ч§', '>':'Ч’ЧЁ', '<':'Ч’Ч©', '.':'Ч’ЧӘ', '"':'Ч’Чҡ', "'":'Ч’Чқ', '[':'Ч’Чҹ', ']':'Ч’ЧЈ', '{':'Ч’ЧҘ', '}':'Ч“Чҗ',
        ',':'Ч“Ч‘', ';':'Ч“Ч’', ':':'Ч“Ч“', '/':'Ч“Ч”', '\\':'Ч“Ч•', '|':'Ч“Ч–', '?':'Ч“Ч—', '+':'Ч“Чҳ', '=':'Ч“Чҷ', '-':'Ч“Чӣ',
        '_':'Ч“Чң', '~':'Ч“Чһ', '`':'Ч“Ч ',
        // ЧўЧ‘ЧЁЧҷЧӘ - Ч”Ч©ЧӘЧһЧ©Ч Ч• Ч‘Ч§ЧҷЧ“Ч•ЧһЧӘ Ч“' Ч•Ч”' ЧӣЧ“Чҷ Ч©ЧңЧҗ ЧҷЧӘЧ Ч’Ч© ЧўЧқ Чҗ' Ч•-Ч‘' Ч©Чң Ч”ЧҗЧ Ч’ЧңЧҷЧӘ
        'Чҗ':'Ч“ЧЎ', 'Ч‘':'Ч“Чў', 'Ч’':'Ч“ЧӨ', 'Ч“':'Ч“ЧҰ', 'Ч”':'Ч“Ч§', 'Ч•':'Ч“ЧЁ', 'Ч–':'Ч“Ч©', 'Ч—':'Ч“ЧӘ', 'Чҳ':'Ч“Чҡ', 'Чҷ':'Ч“Чқ',
        'Чӣ':'Ч“Чҹ', 'Чң':'Ч“ЧЈ', 'Чһ':'Ч“ЧҘ', 'Ч ':'Ч”Чҗ', 'ЧЎ':'Ч”Ч‘', 'Чў':'Ч”Ч’', 'ЧӨ':'Ч”Ч“', 'ЧҰ':'Ч”Ч”', 'Ч§':'Ч”Ч•', 'ЧЁ':'Ч”Ч–',
        'Ч©':'Ч”Ч—', 'ЧӘ':'Ч”Чҳ', 'Чҡ':'Ч”Чҷ', 'Чқ':'Ч”Чӣ', 'Чҹ':'Ч”Чң', 'ЧЈ':'Ч”Чһ', 'ЧҘ':'Ч”Ч '
    };

    const reverseMap = {};
    for (let key in en) { reverseMap[en[key]] = key; }

    function toggleMode() {
        isReverseMode = !isReverseMode;
        const display = document.getElementById('modeDisplay');
        display.innerText = isReverseMode ? "ЧһЧҰЧ‘ Ч Ч•ЧӣЧ—Чҷ: Ч”ЧӨЧ•Чҡ (Ч§Ч•Ч“ вҶҗ ЧҳЧ§ЧЎЧҳ)" : "ЧһЧҰЧ‘ Ч Ч•ЧӣЧ—Чҷ: ЧЁЧ’ЧҷЧң (ЧҳЧ§ЧЎЧҳ вҶҗ Ч§Ч•Ч“)";
        display.style.color = isReverseMode ? "#e67e22" : "var(--primary)";
        processText();
    }

    function processText() {
        const input = document.getElementById('inputText').value;
        let finalOutput = "";
        if (!input) { document.getElementById('outputText').value = ""; return; }

        if (!isReverseMode) {
            for (let char of input) {
                finalOutput += (char === '\n' || char === '\r') ? char : (en[char] || "");
            }
        } else {
            let i = 0;
            while (i < input.length) {
                if (input[i] === '\n' || input[i] === '\r') {
                    finalOutput += input[i]; i++;
                } else {
                    let pair = input.substr(i, 2);
                    if (reverseMap[pair]) { finalOutput += reverseMap[pair]; i += 2; }
                    else { i++; }
                }
            }
        }
        document.getElementById('outputText').value = finalOutput;
        //if (finalOutput) autoCopyToClipboard(finalOutput);
    }

    function autoCopyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast()).catch(() => {});
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.className = "show";
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { toast.className = ""; }, 2000);
    }

    function copyToClipboard(manual = false) {
        const output = document.getElementById('outputText');
        if(!output.value) return;
        navigator.clipboard.writeText(output.value);
        if(manual) showToast();
    }

    function downloadTxt() {
        const text = document.getElementById('outputText').value;
        if(!text) return;
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', "translation.txt");
        element.click();
    }
</script>
</body>
</html>
