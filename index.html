<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОъОфОеОњОЮ ОъОЉОаОћ ОъОЋОЊОеОаОЎ - ОюОЎОЎОЉ</title>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --success: #2ecc71;
            --success-hover: #27ae60;
            --warning: #f39c12;
            --warning-hover: #d68910;
            --bg: #f0f2f5;
            --text-main: #2c3e50;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-en { background-color: var(--primary); }
        .btn-copy { background-color: var(--success); }
        .btn-download { background-color: var(--warning); }

        #outputText {
            background-color: #fafbfc;
            border-style: dashed;
        }

        .live-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #ff4757;
            color: white;
            border-radius: 4px;
            font-size: 0.7rem;
            vertical-align: middle;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ОфОеОњОЋОЮ ОЕОЋОъОе ОъОЉОаОћ <span class="live-badge">LIVE</span></h1>
    
    <label for="inputText">ОўОДОАОў ОъОДОЋОе (ОћОДОюОЊ ОЏОљОЪ ОюОфОеОњОЋОЮ ОъОЎОЎОЊОЎ)</label>
    <textarea id="inputText" oninput="processEn()" placeholder="ОћОЊОЉОД ОљОЋ ОћОДОюОЊ ОўОДОАОў ОЏОљОЪ..."></textarea>

    <div class="actions">
        <button class="btn-copy" onclick="copyToClipboard()">­ЪЊІ ОћОбОфОД ОцОюОў</button>
        <button class="btn-download" onclick="downloadTxt()">­ЪњЙ ОћОЋОеОЊ ОДОЋОЉОЦ</button>
    </div>

    <label for="outputText">ОфОЋОдОљОф ОћОфОеОњОЋОЮ</label>
    <textarea id="outputText" readonly placeholder="ОћОфОЋОдОљОћ ОфОЋОцОЎОб ОЏОљОЪ..."></textarea>
</div>

<script>
    const en = {
        // ОљОЋОфОЎОЋОф ОДОўОаОЋОф
        'a':'ОљОљ', 'b':'ОљОЉ', 'c':'ОљОњ', 'd':'ОљОЊ', 'e':'ОљОћ', 'f':'ОљОЋ', 'g':'ОљОќ', 'h':'ОљОЌ', 'i':'ОљОў', 'j':'ОљОЎ',
        'k':'ОљОЏ', 'l':'ОљОю', 'm':'ОљОъ', 'n':'ОљОа', 'o':'ОљОА', 'p':'ОљОб', 'q':'ОљОц', 'r':'ОљОд', 's':'ОљОД', 't':'ОљОе',
        'u':'ОљОЕ', 'v':'ОљОф', 'w':'ОљОџ', 'x':'ОљОЮ', 'y':'ОљОЪ', 'z':'ОљОБ',
        // ОљОЋОфОЎОЋОф ОњОЊОЋОюОЋОф
        'A':'ОљОЦ', 'B':'ОЉОљ', 'C':'ОЉОЉ', 'D':'ОЉОњ', 'E':'ОЉОЊ', 'F':'ОЉОћ', 'G':'ОЉОЋ', 'H':'ОЉОќ', 'I':'ОЉОЌ', 'J':'ОЉОў',
        'K':'ОЉОЎ', 'L':'ОЉОЏ', 'M':'ОЉОю', 'N':'ОЉОъ', 'O':'ОЉОа', 'P':'ОЉОА', 'Q':'ОЉОб', 'R':'ОЉОц', 'S':'ОЉОд', 'T':'ОЉОД',
        'U':'ОЉОе', 'V':'ОЉОЕ', 'W':'ОЉОф', 'X':'ОЉОџ', 'Y':'ОЉОЮ', 'Z':'ОЉОЪ',
        // ОъОАОцОеОЎОЮ ОЋОАОЎОъОаОЎОЮ
        '0':'ОЉОБ', '1':'ОЉОЦ', '2':'ОњОљ', '3':'ОњОЉ', '4':'ОњОњ', '5':'ОњОЊ', '6':'ОњОћ', '7':'ОњОЋ', '8':'ОњОќ', '9':'ОњОЌ',
        ' ':'ОњОў', '(':'ОњОЎ', ')':'ОњОЏ', '*':'ОњОю', '&':'ОњОъ', '^':'ОњОа', '%':'ОњОА', '$':'ОњОб', '#':'ОњОц', '@':'ОњОд',
        '!':'ОњОД', '>':'ОњОе', '<':'ОњОЕ', '.':'ОњОф', '"':'ОњОџ', "'":'ОњОЮ', '[':'ОњОЪ', ']':'ОњОБ', '{':'ОњОЦ', '}':'ОЊОљ',
        ',':'ОЊОЉ', ';':'ОЊОњ', ':':'ОЊОЊ', '/':'ОЊОћ', '\\':'ОЊОЋ', '|':'ОЊОќ', '?':'ОЊОЌ', '+':'ОЊОў', '=':'ОЊОЎ', '-':'ОЊОЏ',
        '_':'ОЊОю', '~':'ОЊОъ', '`':'ОЊОа',
        // ОљОЋОфОЎОЋОф ОЉОбОЉОеОЎОф (27 ОфОЋОЋОЎОЮ)
        'Ољ':'ОЊОА', 'ОЉ':'ОЊОб', 'Оњ':'ОЊОц', 'ОЊ':'ОЊОд', 'Оћ':'ОЊОД', 'ОЋ':'ОЊОе', 'Оќ':'ОЊОЕ', 'ОЌ':'ОЊОф', 'Оў':'ОЊОџ', 'ОЎ':'ОЊОЮ',
        'ОЏ':'ОЊОЪ', 'Ою':'ОЊОБ', 'Оъ':'ОЊОЦ', 'Оа':'ОћОљ', 'ОА':'ОћОЉ', 'Об':'ОћОњ', 'Оц':'ОћОЊ', 'Од':'ОћОћ', 'ОД':'ОћОЋ', 'Ое':'ОћОќ',
        'ОЕ':'ОћОЌ', 'Оф':'ОћОў', 'Оџ':'ОћОЎ', 'ОЮ':'ОћОЏ', 'ОЪ':'ОћОю', 'ОБ':'ОћОъ', 'ОЦ':'ОћОа'
    };

    function processEn() {
        const input = document.getElementById('inputText').value;
        let finalOutput = "";

        for (let char of input) {
            if (char === '\n' || char === '\r') {
                finalOutput += char;
            } else {
                // ОЕОЎОъОЋОЕ ОЎОЕОЎОе ОЉОъОЎОцОЋОЎ ОюОюОљ ОћОъОеОћ ОъОЋОДОЊОъОф
                finalOutput += en[char] || "";
            }
        }
        document.getElementById('outputText').value = finalOutput;
    }

    function copyToClipboard() {
        const output = document.getElementById('outputText');
        if(!output.value) return;
        output.select();
        document.execCommand('copy');
        
        const btn = document.querySelector('.btn-copy');
        const originalText = btn.innerHTML;
        btn.innerHTML = 'РюЁ ОћОЋОбОфОД!';
        setTimeout(() => btn.innerHTML = originalText, 2000);
    }

    function downloadTxt() {
        const text = document.getElementById('outputText').value;
        if(!text) return alert('ОљОЎОЪ ОўОДОАОў ОюОћОЋОеОЊОћ');
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', "translation.txt");
        element.click();
    }
</script>
</body>
</html>
